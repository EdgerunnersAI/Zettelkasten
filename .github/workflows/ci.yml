name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: pytest (mocked)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ops/requirements.txt
            ops/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/requirements-dev.txt

      - name: Run pytest
        env:
          GEMINI_API_KEY: "ci-stub"
          # Stubs for the v2 Supabase client so module-level / fallback
          # constructor paths don't fail validation under unit-test mocks.
          # Tests inject MagicMock clients — these values are never used to
          # make network calls; they only let get_v2_client() construct.
          SUPABASE_V2_URL: "https://ci-stub.supabase.co"
          SUPABASE_V2_ANON_KEY: "ci-stub-anon"
          SUPABASE_V2_SERVICE_ROLE_KEY: "ci-stub-service"
          NEXUS_TOKEN_ENCRYPTION_KEY: "7TgtMgeR5dMTnXxW6ULICwhf66A1VpzwuNFuIBqmoe4="
        run: |
          pytest -q --maxfail=5
