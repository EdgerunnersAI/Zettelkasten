name: launcher secret scan

# UP-21: pre-merge gate that fails CI if `purchase_launcher.js` contains any
# Razorpay key-secret, webhook-secret, or Stripe-shaped key. The launcher is
# browser-shipped — leaking a credential here is an immediate prod incident.
#
# Mirror of tests/unit/user_pricing/test_launcher_secrets.py FORBIDDEN regex.
# If the regex changes there, update it here too.

on:
  push:
    branches: [master]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Forbid secrets in purchase_launcher.js
        run: |
          set -e
          FILE=website/features/user_pricing/js/purchase_launcher.js
          if [ ! -f "$FILE" ]; then
            echo "::error::$FILE missing"
            exit 1
          fi
          # Same regex as tests/unit/user_pricing/test_launcher_secrets.py.
          # grep -E so character classes work; -n for line numbers in output.
          if grep -nE '(KEY_SECRET|RAZORPAY_KEY_SECRET|WEBHOOK_SECRET|sk_live|sk_test_[A-Za-z0-9]{20,})' "$FILE"; then
            echo "::error::Secret-shaped string found in launcher (matches above). Browser JS must never contain key secrets — only the PUBLIC key_id (delivered via /api/payments/orders response) is allowed."
            exit 1
          fi
          echo "OK -- launcher is secret-free."
