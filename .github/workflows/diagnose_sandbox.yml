name: Diagnose Sandbox (one-shot)

# LEGACY (broken after 2026-05-11): invokes ops/scripts/diagnose_sandbox.py which
# references dropped public.kg_users / kg_nodes / rag_sandbox_members. Manual-
# dispatch only — won't fire silently. Revive after porting to v2 schema
# (workspaces / content_nodes via website.core.supabase_v2).

on:
  workflow_dispatch:
    inputs:
      sandbox_id:
        description: "Sandbox UUID to diagnose"
        required: true
        type: string

permissions:
  contents: read

jobs:
  diagnose:
    name: Diagnose sandbox ${{ inputs.sandbox_id }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ops/requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/requirements.txt
      - name: Run diagnose
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: PYTHONPATH="$PWD" python ops/scripts/diagnose_sandbox.py --sandbox-id ${{ inputs.sandbox_id }}
