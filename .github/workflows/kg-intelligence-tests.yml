name: KG Intelligence Tests

on:
  # 2026-05-11: removed stale `website/core/supabase_kg/**` filter (directory
  # was retired in Phase 8.0.6 — only a __pycache__ remained). Kept v2-aware
  # paths so the workflow actually fires on relevant changes.
  pull_request:
    paths:
      - 'website/features/kg_features/**'
      - 'website/core/supabase_v2/**'
      - 'supabase/website/_v2/**'
      - 'tests/kg_intelligence/**'
      - 'ops/requirements.txt'
      - '.github/workflows/kg-intelligence-tests.yml'
  push:
    branches: [master]
    paths:
      - 'website/features/kg_features/**'
      - 'website/core/supabase_v2/**'
      - 'supabase/website/_v2/**'
      - 'tests/kg_intelligence/**'
      - 'ops/requirements.txt'
      - '.github/workflows/kg-intelligence-tests.yml'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            ops/requirements.txt
            ops/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/requirements-dev.txt
      - name: Run KG intelligence tests
        env:
          GEMINI_API_KEY: "ci-stub"
        run: python -m pytest tests/kg_intelligence/ -v --tb=short
