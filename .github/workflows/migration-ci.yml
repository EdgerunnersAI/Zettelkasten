name: Migration CI

on:
  workflow_dispatch:
  pull_request:
    paths: ['supabase/**/*.sql']
  push:
    branches: [master]
    paths: ['supabase/**/*.sql']

jobs:
  migrate-fresh:
    name: Fresh-DB migration apply
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: kg_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v5
      - name: Prepare legacy Supabase baseline
        env:
          PGPASSWORD: ci
        run: |
          psql -h localhost -U postgres -d kg_ci -v ON_ERROR_STOP=1 <<'SQL'
          SET check_function_bodies = off;

          DO $$
          BEGIN
            CREATE ROLE anon;
          EXCEPTION
            WHEN duplicate_object THEN NULL;
          END $$;

          DO $$
          BEGIN
            CREATE ROLE authenticated;
          EXCEPTION
            WHEN duplicate_object THEN NULL;
          END $$;

          DO $$
          BEGIN
            CREATE ROLE service_role;
          EXCEPTION
            WHEN duplicate_object THEN NULL;
          END $$;

          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE OR REPLACE FUNCTION auth.uid()
          RETURNS uuid
          LANGUAGE sql
          STABLE
          AS $$
            SELECT NULLIF(current_setting('request.jwt.claim.sub', true), '')::uuid
          $$;

          CREATE OR REPLACE FUNCTION auth.role()
          RETURNS text
          LANGUAGE sql
          STABLE
          AS $$
            SELECT NULLIF(current_setting('request.jwt.claim.role', true), '')
          $$;

          CREATE EXTENSION IF NOT EXISTS vector;

          \i supabase/website/kg_public/schema.sql
          \i supabase/website/kg_features/001_intelligence.sql
          \i supabase/website/rag_chatbot/002_chunks_table.sql
          \i supabase/website/rag_chatbot/003_sandboxes.sql
          \i supabase/website/rag_chatbot/004_chat_sessions.sql
          SQL
      - name: Apply all kg_public migrations from scratch
        env:
          PGPASSWORD: ci
        run: |
          for f in $(ls supabase/website/kg_public/migrations/*.sql | sort); do
            echo "::group::Applying $f"
            psql -h localhost -U postgres -d kg_ci -v ON_ERROR_STOP=1 -f "$f"
            echo "::endgroup::"
          done
