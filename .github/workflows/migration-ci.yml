name: Migration CI

on:
  workflow_dispatch:
  pull_request:
    paths: ['supabase/**/*.sql']
  push:
    branches: [master]
    paths: ['supabase/**/*.sql']

jobs:
  # 2026-05-11: removed legacy `migrate-fresh` job. It applied
  # kg_public/migrations/*.sql + kg_public/ci_baseline.sql (both legacy v1
  # references to dropped public.kg_* tables) to a fresh pgvector container.
  # v1 is gone post-Phase-8; coverage moved to migrate-v2-fresh below.

  migrate-v2-fresh:
    # Phase 8.5.R1-3: PR-time "_v2 applies cleanly on a fresh Supabase stack"
    # gate. Boots a full local Supabase stack (auth/GoTrue, vault, pgsodium,
    # pgvector) via `supabase start` so RLS policies referencing auth.uid() /
    # auth.jwt() / auth.users compile against the real schema (vanilla
    # pgvector/pgvector containers can't represent these).
    #
    # Canonical pattern per R-A research (Supabase docs + community 2024-2026).
    # Composes with `lint-v2-sql` (Squawk; advisory) + `v2_drift_check.yml`
    # (nightly against prod) for the 3-layer migration gate.
    name: Fresh-Supabase _v2 apply + manifest check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # WAVE-D hardening (H-1): authoritative gate. CI image is pre-built with
    # pg_partman so `supabase start` boots clean. Rationale + citations in
    # docs/research/2026-05-12-pg-partman-ci.md.
    # 2026-05-12 Iter 8 (research-grounded refactor): dropped the snapshot-
    # comparison gate from PR CI per industry consensus (Atlas, Flyway,
    # Bytebase, Supabase Docs all converge: PR CI gates on apply-cleanly +
    # integration tests; snapshot comparison belongs in nightly drift jobs).
    # See docs/research/2026-05-12-migration-ci-architecture.md. The auto-
    # commit-from-CI step (prior Hardening A2) was an explicit anti-pattern
    # per Atlas "Detect Migrations Drift in CI" guidance — deleted.
    # contents:read suffices now that nothing pushes back to the branch.
    permissions:
      contents: read
      pull-requests: read
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Build CI Postgres image with pg_partman
        # Tag matches what `supabase start` expects — Docker resolves the
        # local image before reaching for the registry, so the CLI picks ours
        # up without needing config.toml [db].image (supabase/cli#3688 open).
        run: |
          docker build \
            -f ci/Dockerfile.zettelkasten-postgres \
            --build-arg SUPABASE_POSTGRES_TAG=17.6.1.001 \
            -t supabase/postgres:17.6.1.001 \
            ci/
      - name: Boot local Supabase stack
        run: |
          # `supabase start` boots Postgres + GoTrue + Storage + Realtime +
          # vault + pgsodium + pgvector in Docker. The Postgres URL is fixed
          # at 127.0.0.1:54322 with postgres/postgres credentials.
          supabase start --workdir . --ignore-health-check || (supabase status --workdir .; exit 1)
          supabase status --workdir .
      - name: Bootstrap partman schema (CI-only, pre-migration)
        # 2026-05-12: Migration 00_extensions.sql has `CREATE EXTENSION
        # pg_partman SCHEMA partman` which requires partman schema to
        # already exist (pg_partman 5.3.1+ upstream issue #842). On
        # production Supabase managed Postgres the partman extension is
        # pre-baked so the IF NOT EXISTS clause makes 00 a no-op there;
        # on this fresh CI Postgres we have to create the schema
        # explicitly BEFORE 00 runs. We cannot bake this into a versioned
        # migration (any new migration runs AFTER 00) and we cannot edit
        # 00 itself (Flyway-style immutable-migration checksum lock —
        # already applied to prod, editing it breaks the deploy gate).
        # The canonical fix is CI-image-side bootstrap, done here.
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres \
            -c "CREATE SCHEMA IF NOT EXISTS partman;"
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/requirements.txt
      - name: Apply _v2 migrations to fresh DB
        # Iter 8 (2026-05-12, research-grounded): this is now the ONLY gate
        # in PR-CI for migration correctness. Matches Supabase Docs
        # ("Testing Overview"), Atlas (`migrate lint` + apply, never snapshot
        # compare in PR), Flyway/Liquibase/Bytebase consensus. Schema-snapshot
        # comparison was deleted from this job — it lives in the nightly
        # v2_drift_check.yml workflow where it belongs (compares prod vs
        # repo, catches hand-edits to prod). See research doc:
        # docs/research/2026-05-12-migration-ci-architecture.md.
        env:
          # 2026-05-11: env var name MUST be SUPABASE_V2_DATABASE_URL —
          # apply_migrations.py::_build_dsn(v2=True) reads only this name.
          SUPABASE_V2_DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          # MIGRATION_MANIFEST_REQUIRED=0 tells apply_migrations.py's inline
          # verify-after-apply step "this environment doesn't gate on the
          # manifest" — exactly the documented escape for fresh-apply CI
          # (apply_migrations.py line 862 comment + Iter 7 fix at line 871).
          # Nightly v2_drift_check.yml runs WITHOUT this flag so its
          # --check-manifest-fresh remains authoritative against prod.
          MIGRATION_MANIFEST_REQUIRED: "0"
        # --skip-files=15_drop_legacy_tables.sql — operator-approved hardening
        # sprint H-1 (2026-05-12). Migration 15 has a 14-day soak guard (file
        # header lines 12-18) that fires by design on fresh stack since
        # 11_post_install.sql was just applied seconds ago. The legacy public.*
        # tables don't exist on fresh DB anyway, so dropping them is a no-op
        # here. Production deploys MUST NOT pass --skip-files.
        run: |
          python ops/scripts/apply_migrations.py --v2 \
            --skip-files=15_drop_legacy_tables.sql
      - name: Stop local Supabase
        if: always()
        run: supabase stop --workdir . --no-backup || true

  lint-v2-sql:
    # Phase 8.5.R1-1: Squawk lint for _v2/*.sql migrations.
    # Catches lock-takeing operations (CREATE INDEX without CONCURRENTLY,
    # NOT NULL on existing column without DEFAULT, volatile defaults, etc.)
    # that the manifest gate cannot. Recommended in R1 research over Atlas
    # (paywalled migrate-lint Oct 2025) for our scale + Supabase stack.
    name: Squawk lint _v2 SQL
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # WAVE-C fix: sbdchd/squawk-action@v2 posts annotations via the GitHub
    # Checks API (pull-requests: write). Without this permission the upload
    # step throws "Upload to GitHub failed" even when lint succeeds.
    # WAVE-D H-2 (2026-05-12): authoritative gate. Legacy _v2/*.sql fenced
    # via .squawk.toml excluded_paths; new migrations linted strictly.
    permissions:
      pull-requests: write
      checks: write
      contents: read
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      # Phase 8.5.R1 (S+): official Squawk Action — replaces the prior
      # curl-pin-and-loop block. The old install URL pointed at
      # sbdchd/squawk/releases/download/v2.0.0/squawk-linux-x86_64 which has
      # never existed as a release artifact AND the linux asset was renamed
      # `squawk-linux-x86_64` → `squawk-linux-x64` in modern releases.
      # Pinning version="2.51.0" so a future breaking change in Squawk can't
      # silently break our gate (research recommendation 2024-2026).
      # Two invocations because the action takes a single glob and we want
      # explicit coverage of both versioned and repeatable subtrees.
      # fail-on-violations: false → Squawk warnings are advisory until rule
      # set is tuned. Current state: prefer-robust-stmts fires on every
      # versioned migration because apply_migrations.py wraps each file in a
      # transaction at runtime (Squawk can't see that wrapper). Tuning the
      # exclusion list is a follow-up; for now we observe + report.
      - name: Squawk lint _v2 versioned SQL
        uses: sbdchd/squawk-action@v2
        with:
          pattern: "supabase/website/_v2/*.sql"
          version: "2.51.0"
          fail-on-violations: false
      - name: Squawk lint _v2 repeatable SQL
        uses: sbdchd/squawk-action@v2
        with:
          pattern: "supabase/website/_v2/repeatable/*.sql"
          version: "2.51.0"
          fail-on-violations: false
